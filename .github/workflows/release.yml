name: Build & release KaproVPN

# Auto-builds on every vX.Y.Z tag push for all three desktop OSes.
# The matrix runs in parallel; each job produces its own artifact and
# uploads to the same GitHub Release for the tag.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write  # needed to upload release assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # one OS failing shouldn't block the others
      matrix:
        include:
          - os: windows-latest
            artifact_name: KaproVPN-Windows-x64.exe
            build_cmd: |
              python -m PyInstaller KaproVPN.spec --noconfirm --log-level WARN
              python -m PyInstaller KaproVPN-Setup.spec --noconfirm --log-level WARN
            payload_path: |
              dist/KaproVPN-Setup.exe
              dist/KaproVPN.exe
            shell: pwsh
          - os: macos-latest
            artifact_name: KaproVPN-macOS-arm64.dmg
            # macos-latest is Apple Silicon (M-series). Build .app then
            # wrap it in a .dmg via hdiutil. The .dmg is a single double-
            # clickable file users drag into /Applications.
            build_cmd: |
              set -euo pipefail
              # PyInstaller's BUNDLE() rejects .png — needs proper .icns.
              # Use macOS-native sips + iconutil to generate one from our
              # PNG (Apple's required iconset has square sizes 16..512).
              mkdir -p icon.iconset
              for SZ in 16 32 128 256 512; do
                sips -z $SZ $SZ kapro_vpn/data/icon.png \
                  --out icon.iconset/icon_${SZ}x${SZ}.png > /dev/null
                DBL=$((SZ * 2))
                sips -z $DBL $DBL kapro_vpn/data/icon.png \
                  --out icon.iconset/icon_${SZ}x${SZ}@2x.png > /dev/null
              done
              iconutil -c icns icon.iconset -o kapro_vpn/data/icon.icns
              ls -lh kapro_vpn/data/icon.icns
              python -m PyInstaller KaproVPN.spec --noconfirm --log-level WARN
              ls -la dist/
              # Package .app into a .dmg
              mkdir -p dist/dmg_root
              cp -R dist/KaproVPN.app dist/dmg_root/
              ln -s /Applications dist/dmg_root/Applications
              hdiutil create -volname "KaproVPN" -srcfolder dist/dmg_root \
                -ov -format UDZO dist/KaproVPN-macOS-arm64.dmg
              rm -rf dist/dmg_root
            payload_path: dist/KaproVPN-macOS-arm64.dmg
            shell: bash
          - os: ubuntu-latest
            artifact_name: KaproVPN-Linux-x64.AppImage
            # AppImage is the most distro-agnostic format. We package
            # the PyInstaller output into AppDir layout then run
            # appimagetool. The resulting .AppImage is one chmod +x
            # away from running on any glibc-2.31+ distro.
            build_cmd: |
              python -m PyInstaller KaproVPN.spec --noconfirm --log-level WARN
              # AppDir layout per AppImage spec
              mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps \
                       AppDir/usr/share/applications
              cp dist/KaproVPN AppDir/usr/bin/kaprovpn
              chmod +x AppDir/usr/bin/kaprovpn
              cp kapro_vpn/data/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/kaprovpn.png
              cp kapro_vpn/data/icon.png AppDir/kaprovpn.png  # root icon, AppImage requires it
              cat > AppDir/kaprovpn.desktop <<'EOF'
              [Desktop Entry]
              Type=Application
              Name=KaproVPN
              Comment=VPN client with split routing
              Exec=kaprovpn
              Icon=kaprovpn
              Categories=Network;
              Terminal=false
              EOF
              cp AppDir/kaprovpn.desktop AppDir/usr/share/applications/
              cat > AppDir/AppRun <<'EOF'
              #!/bin/bash
              HERE="$(dirname "$(readlink -f "${0}")")"
              exec "${HERE}/usr/bin/kaprovpn" "$@"
              EOF
              chmod +x AppDir/AppRun
              # Fetch appimagetool once per build
              wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
                -O appimagetool
              chmod +x appimagetool
              ./appimagetool --appimage-extract
              ARCH=x86_64 ./squashfs-root/AppRun AppDir dist/KaproVPN-Linux-x64.AppImage
            payload_path: dist/KaproVPN-Linux-x64.AppImage
            shell: bash

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linux system deps (xcb, etc.)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Qt6 wants these at runtime — PySide6 wheel doesn't include
          # the X11/wayland platform plugins' system dependencies.
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            wget fuse libfuse2

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build payload
        run: ${{ matrix.build_cmd }}

      - name: Show built artifacts
        if: matrix.os == 'windows-latest'
        run: Get-ChildItem dist/ | Format-Table Name, Length

      - name: Show built artifacts (unix)
        if: matrix.os != 'windows-latest'
        run: ls -lh dist/

      - name: Upload artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: ${{ matrix.payload_path }}
          if-no-files-found: error

      - name: Attach to GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.payload_path }}
          generate_release_notes: true
          body: |
            ## KaproVPN ${{ github.ref_name }}

            ### ⬇ Скачать (выбери под свою систему)

            | OS | Файл | Что делать |
            |----|------|-----------|
            | Windows 10/11 (x64) | `KaproVPN-Setup.exe` | Запустить, пара кликов |
            | macOS (Apple Silicon) | `KaproVPN-macOS-arm64.dmg` | Открыть DMG, перетащить в Applications |
            | Linux (x64) | `KaproVPN-Linux-x64.AppImage` | `chmod +x` и запустить |

            **HTTP-прокси и TUN режимы работают на всех трёх ОС.**
            TUN тоннелирует Telegram/Steam/игры системно (нужны
            UAC на Windows, `sudo` на mac, `pkexec`/`sudo` на Linux).

            Auto-built by GitHub Actions from `${{ github.ref_name }}`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
