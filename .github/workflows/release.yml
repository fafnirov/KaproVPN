name: Build & release KaproTUN

# Auto-builds on every vX.Y.Z tag push for all three desktop OSes.
# The matrix runs in parallel; each job produces its own artifact and
# uploads to the same GitHub Release for the tag.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write  # needed to upload release assets

jobs:
  smoke-test:
    # Gates the matrix build. If smoke fails, NOTHING ships — saves
    # users from downloading a broken release. ~1 minute overhead per
    # release.
    name: Pre-release smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Qt runtime deps
        # PySide6 imports work but Qt platform plugin needs xcb stack
        # even in offscreen mode on some images. Same set as the
        # ubuntu-latest build job needs.
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt
      - name: Run smoke test
        env:
          # Headless Qt — no display server on the runner.
          QT_QPA_PLATFORM: offscreen
        run: python -m kapro_tun.scripts.smoke_test

  build:
    name: Build (${{ matrix.os }})
    # Builds run only if smoke passes — a single failing import
    # gates ALL three OS builds from publishing.
    needs: smoke-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # one OS failing shouldn't block the others
      matrix:
        include:
          - os: windows-latest
            artifact_name: KaproTUN-Windows-x64.exe
            build_cmd: |
              python -m PyInstaller KaproTUN.spec --noconfirm --log-level WARN
              python -m PyInstaller KaproTUN-Setup.spec --noconfirm --log-level WARN
            payload_path: |
              dist/KaproTUN-Setup.exe
              dist/KaproTUN.exe
            shell: pwsh
          - os: macos-latest
            artifact_name: KaproTUN-macOS-arm64.dmg
            # macos-latest is Apple Silicon (M-series). Build .app then
            # wrap it in a .dmg via hdiutil. The .dmg is a single double-
            # clickable file users drag into /Applications.
            build_cmd: |
              set -euo pipefail
              # PyInstaller's BUNDLE() rejects .png — needs proper .icns.
              # Use macOS-native sips + iconutil to generate one from our
              # PNG (Apple's required iconset has square sizes 16..512).
              mkdir -p icon.iconset
              for SZ in 16 32 128 256 512; do
                sips -z $SZ $SZ kapro_tun/data/icon.png \
                  --out icon.iconset/icon_${SZ}x${SZ}.png > /dev/null
                DBL=$((SZ * 2))
                sips -z $DBL $DBL kapro_tun/data/icon.png \
                  --out icon.iconset/icon_${SZ}x${SZ}@2x.png > /dev/null
              done
              iconutil -c icns icon.iconset -o kapro_tun/data/icon.icns
              ls -lh kapro_tun/data/icon.icns
              python -m PyInstaller KaproTUN.spec --noconfirm --log-level WARN
              ls -la dist/
              # Package .app into a .dmg
              mkdir -p dist/dmg_root
              cp -R dist/KaproTUN.app dist/dmg_root/
              ln -s /Applications dist/dmg_root/Applications
              hdiutil create -volname "KaproTUN" -srcfolder dist/dmg_root \
                -ov -format UDZO dist/KaproTUN-macOS-arm64.dmg
              rm -rf dist/dmg_root
            payload_path: dist/KaproTUN-macOS-arm64.dmg
            shell: bash
          - os: ubuntu-latest
            artifact_name: KaproTUN-Linux-x64.AppImage
            # AppImage is the most distro-agnostic format. We package
            # the PyInstaller output into AppDir layout then run
            # appimagetool. The resulting .AppImage is one chmod +x
            # away from running on any glibc-2.31+ distro.
            build_cmd: |
              python -m PyInstaller KaproTUN.spec --noconfirm --log-level WARN
              # AppDir layout per AppImage spec
              mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps \
                       AppDir/usr/share/applications
              cp dist/KaproTUN AppDir/usr/bin/kaprotun
              chmod +x AppDir/usr/bin/kaprotun
              cp kapro_tun/data/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/kaprotun.png
              cp kapro_tun/data/icon.png AppDir/kaprotun.png  # root icon, AppImage requires it
              cat > AppDir/kaprotun.desktop <<'EOF'
              [Desktop Entry]
              Type=Application
              Name=KaproTUN
              Comment=VPN client with split routing
              Exec=kaprotun
              Icon=kaprotun
              Categories=Network;
              Terminal=false
              EOF
              cp AppDir/kaprotun.desktop AppDir/usr/share/applications/
              cat > AppDir/AppRun <<'EOF'
              #!/bin/bash
              HERE="$(dirname "$(readlink -f "${0}")")"
              exec "${HERE}/usr/bin/kaprotun" "$@"
              EOF
              chmod +x AppDir/AppRun
              # Fetch appimagetool once per build
              wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
                -O appimagetool
              chmod +x appimagetool
              ./appimagetool --appimage-extract
              ARCH=x86_64 ./squashfs-root/AppRun AppDir dist/KaproTUN-Linux-x64.AppImage
            payload_path: dist/KaproTUN-Linux-x64.AppImage
            shell: bash

    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Linux system deps (xcb, etc.)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # Qt6 wants these at runtime — PySide6 wheel doesn't include
          # the X11/wayland platform plugins' system dependencies.
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            wget fuse libfuse2

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build payload
        run: ${{ matrix.build_cmd }}

      - name: Show built artifacts
        if: matrix.os == 'windows-latest'
        run: Get-ChildItem dist/ | Format-Table Name, Length

      - name: Show built artifacts (unix)
        if: matrix.os != 'windows-latest'
        run: ls -lh dist/

      - name: Upload artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: ${{ matrix.payload_path }}
          if-no-files-found: error

      - name: Extract release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/v') && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # CHANGELOG.md has two `# ` sections — `# Android` (entries from
          # the parallel Android codebase) and `# Desktop (...)` (entries
          # from this workflow's builds). Take the top-most `## ` section
          # INSIDE the Desktop block — otherwise our v1.10.x desktop tag
          # would publish with the Android v0.1.0 description, which is
          # exactly what bit us in v1.10.0 → v1.10.2.
          awk '
            /^# Desktop/    { in_desktop=1; next }
            /^# /           { if (in_desktop) exit }
            !in_desktop     { next }
            /^## /          { if (found) exit; found=1; next }
            /^---$/         { if (found) exit }
            found           { print }
          ' CHANGELOG.md > /tmp/release-body-top.md

          # Append the static "how to download" table after the
          # per-release notes — same for every release.
          cat >> /tmp/release-body-top.md <<'EOF'

          ---

          ### ⬇ Скачать (выбери под свою систему)

          | OS | Файл | Что делать |
          |----|------|-----------|
          | Windows 10/11 (x64) | `KaproTUN-Setup.exe` | Запустить, пара кликов |
          | macOS (Apple Silicon) | `KaproTUN-macOS-arm64.dmg` | Открыть DMG, перетащить в Applications |
          | Linux (x64) | `KaproTUN-Linux-x64.AppImage` | `chmod +x` и запустить |

          Полный changelog: [CHANGELOG.md](../../blob/main/CHANGELOG.md)

          ---

          Auto-built by GitHub Actions from `${{ github.ref_name }}`.
          EOF

          echo "=== Release body preview ==="
          cat /tmp/release-body-top.md

      - name: Attach to GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.payload_path }}
          generate_release_notes: true
          # Each matrix job runs this — but only ubuntu-latest extracted
          # the body file. softprops accepts a body_path that doesn't
          # exist (treats as empty) so windows/macos jobs just attach
          # files without touching the body — ubuntu-latest set it once.
          body_path: /tmp/release-body-top.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
