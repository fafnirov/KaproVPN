name: Build & release KaproVPN.exe

# Auto-builds whenever you push a vX.Y.Z tag, plus a manual button on
# the Actions tab for ad-hoc builds you don't want to ship.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write  # needed to upload assets to a Release

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build KaproVPN.exe (portable)
        shell: pwsh
        run: |
          python -m PyInstaller KaproVPN.spec --noconfirm --log-level WARN

      - name: Build KaproVPN-Setup.exe (installer, embeds the portable exe)
        shell: pwsh
        run: |
          python -m PyInstaller KaproVPN-Setup.spec --noconfirm --log-level WARN

      - name: Show built artifacts
        shell: pwsh
        run: |
          Get-ChildItem dist/ | Format-Table Name, Length

      - name: Upload artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: KaproVPN-Setup-${{ github.sha }}
          # Only ship the installer publicly. The portable KaproVPN.exe
          # is still built (the installer embeds it), but isn't uploaded.
          path: dist/KaproVPN-Setup.exe
          if-no-files-found: error

      - name: Attach to GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # Both files are uploaded: Setup.exe is what users download,
          # KaproVPN.exe is the payload the installer fetches at install
          # time. Listing it second in the assets keeps Setup.exe on top.
          files: |
            dist/KaproVPN-Setup.exe
            dist/KaproVPN.exe
          generate_release_notes: true
          body: |
            ## KaproVPN ${{ github.ref_name }}

            ### ⬇ Скачать

            **[`KaproVPN-Setup.exe`](../../releases/download/${{ github.ref_name }}/KaproVPN-Setup.exe)** — установщик (~45 МБ).

            Скачал → запустил → пара кликов → программа в меню Пуск,
            ярлык на рабочем столе, запись в Programs & Features.
            Без прав администратора (ставится в `%LOCALAPPDATA%\Programs\KaproVPN\`).

            > Установщик во время работы скачает основной `KaproVPN.exe` (~54 МБ)
            > с этой же страницы релиза. Нужен интернет на момент установки.

            Только Windows 10/11 (x64). Для TUN-режима (туннелировать ВСЕ
            приложения — ТГ, Steam, игры) — запускай от админа после установки.

            Auto-built by GitHub Actions from the `${{ github.ref_name }}` tag commit.

            **Что нового** — см. ниже.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
